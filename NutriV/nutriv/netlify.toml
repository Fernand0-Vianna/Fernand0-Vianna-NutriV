[build]
  publish = "build/web"
  command = "if [ ! -d \"flutter\" ]; then git clone https://github.com/flutter/flutter.git -b stable --depth 1; fi && export PATH=\"$PATH:`pwd`/flutter/bin\" && flutter config --no-analytics && flutter build web --release"

[build.environment]
  FLUTTER_VERSION = "stable"

# Supabase Configuration (substitua pelos valores reais no Netlify Dashboard)
  SUPABASE_URL = "https://lkfefyucixmcrmpvcazg.supabase.co"
  # SUPABASE_ANON_KEY deve ser configurada no Netlify Dashboard como variável sensível

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
