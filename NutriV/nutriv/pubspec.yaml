name: nutriv
description: "NutriV - AI Calorie Counter App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
# State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  
  # Navigation
  go_router: ^17.2.2
  
  # Networking
  dio: ^5.8.0
  
  # Local Storage
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2+1
  path: ^1.9.1
  
  # Image & Camera
  image_picker: ^1.2.2
  camera: ^0.12.0+1
  flutter_svg: ^2.0.17
  
  # Barcode Scanner
  mobile_scanner: ^7.0.1
  
  # Voice Input
  speech_to_text: ^7.0.0
  
  # Sensors for step counting
  sensors_plus: ^7.0.0
  
  # HTTP
  http: ^1.2.0
  
  # Charts
  fl_chart: ^1.2.0
  
  # Utils
  get_it: ^9.2.1
  intl: ^0.20.2
  uuid: ^4.5.1
  flutter_dotenv: ^6.0.1
  google_fonts: ^8.1.0
  
  # Supabase
  supabase_flutter: ^2.12.4
  
  # Google Auth (Android/iOS native)
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#006A35"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
   uses-material-design: true
   assets:
     - assets/images/