name: nutriv
description: "NutriV - AI Calorie Counter App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  
  # Navigation
  go_router: ^14.8.1
  
  # Networking
  dio: ^5.8.0
  
  # Local Storage
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  path: ^1.9.1
  
  # Image & Camera
  image_picker: ^1.1.2
  camera: ^0.11.1
  
  # Barcode Scanner
  mobile_scanner: ^7.0.1
  
  # Voice Input

  
  # Charts
  fl_chart: ^0.71.0
  
  # Utils
  get_it: ^8.0.3
  intl: ^0.20.2
  uuid: ^4.5.1
  flutter_dotenv: ^5.2.1
  google_fonts: ^6.2.1

  # Auth (OAuth Google)
  google_sign_in: ^6.2.2

  # Supabase
  supabase_flutter: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env